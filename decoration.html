<!DOCTYPE html>
<html>
    <head>
        <style>
            h1 {
                text-decoration: overline;
                text-transform: capitalize;
            }

            h2 {
                text-decoration: line-through;
                text-transform: uppercase;
            }
            h3 {
                text-decoration: underline;
                text-transform: lowercase;
            }
            h4 {
                text-decoration: underline overline line-through;
                text-transform: none;
            }
        </style>
    </head>
    <body>

        <h1>codingal</h1>
        <h2>condingal</h2>
        <h3>codingal</h3>
    </body>
</html>
