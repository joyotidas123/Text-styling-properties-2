<!DOCTYPE html>
<html>
    <head>
        <style>
            div {
                width: 300px;
                height: 100px;
                background-color: yellow;
                border: 1px solid black;
            }
            #mydiv {
                transform: rotatex(180deg);
            }
        </style>
    </head>
    <body>
        <h1>Rotate</h1>
        <div>
            Cordingal
        </div>
        <div id="mydiv">
            Cordingal
        </div>
    </body>
</html>
